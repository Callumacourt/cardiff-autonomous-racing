    #  echo 'Publishers started, keeping container alive...' &&
    #  sleep infinity
    #  "

  base:
    build:
      context: . 
      dockerfile: docker/Dockerfile.base
    container_name: racing_base
    environment:
      - ROS_DOMAIN_ID=0
    networks:
      - racing_network
    entrypoint: ""


  # Perception system
  perception:
    build:
      context: .
      dockerfile: docker/Dockerfile.perception
    container_name: racing_perception
    depends_on:
      - base
    environment:
      - ROS_DOMAIN_ID=0
    volumes:
      - ./logs:/workspace/logs
    networks:
      - racing_network
    entrypoint: >
      bash -c "
      source /opt/ros/humble/setup.bash &&
      source /workspace/perception_ws/install/setup.bash &&
      echo '🎯 Starting perception system...' &&
      ros2 run cone_mapper cone_mapper_v6
      "

  # Path planning
  path_planning:
    build:
      context: .
      dockerfile: docker/Dockerfile.planning
    container_name: racing_planning
    depends_on:
      - perception
    environment:
      - ROS_DOMAIN_ID=0
    volumes:
      - ./logs:/workspace/logs
    networks:
      - racing_network
    entrypoint: ""
    command: >
      bash -c "
      echo '🛣️ Starting path planning...' &&
      source /opt/ros/humble/setup.bash &&
      source /workspace/planning_ws/install/setup.bash &&
      /workspace/planning_ws/install/path_planning/bin/path_planner
      "

  # Control system
  control:
    build:
      context: .
      dockerfile: docker/Dockerfile.control
    container_name: racing_control
    depends_on:
      - path_planning
    environment:
      - ROS_DOMAIN_ID=0
    volumes:
      - ./Control:/workspace/Control
      - ./Control/logs:/workspace/logs
    #networks:
    #  - racing_network
    cap_add:
      - NET_ADMIN
    network_mode: host
    entrypoint: ["/entrypoint.sh"]

networks:
  racing_network:
    driver: bridge

volumes:
  logs: